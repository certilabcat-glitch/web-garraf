<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Energética Profesional | Cataluña</title>
    
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', 'TU_ID_DE_PIXEL_AQUI'); 
        fbq('track', 'PageView');
    </script>

    <style>
        :root { --primary: #002b5b; --secondary: #27ae60; --bg: #f8fafc; --text: #334155; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); line-height: 1.5; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 550px; border-top: 8px solid var(--primary); }
        
        .header { text-align: center; margin-bottom: 30px; }
        .badge { background: #e8f5e9; color: #2e7d32; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; display: inline-block; margin-bottom: 10px; border: 1px solid #c8e6c9; }
        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; letter-spacing: -0.5px; }
        
        .section-title { font-size: 0.8rem; font-weight: bold; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 15px 0; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--secondary); outline: none; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .privacidad { font-size: 0.8rem; color: #64748b; margin: 20px 0; display: flex; align-items: flex-start; gap: 10px; }
        .privacidad input { width: auto; margin-top: 3px; }

        button { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #001f42; transform: translateY(-1px); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .footer { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="badge">ESTUDIO TÉCNICO SUBVENCIONADO</span>
        <h1>Diagnóstico Energético</h1>
    </div>

    <form id="leadForm">
        <div class="section-title">1. Contacto</div>
        <label>Nombre y Apellidos</label>
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        
        <label>WhatsApp Móvil</label>
        <input type="tel" name="whatsapp" placeholder="600 000 000" required>

        <div class="section-title">2. Dirección del Inmueble</div>
        <label>Calle y Número</label>
        <input type="text" name="calle" placeholder="Carrer de la Marina, 123" required>
        
        <div class="grid">
            <div>
                <label>Código Postal</label>
                <input type="text" name="cp" placeholder="08001" required>
            </div>
            <div>
                <label>Provincia</label>
                <select name="provincia" required>
                    <option value="Barcelona">Barcelona</option>
                    <option value="Girona">Girona</option>
                    <option value="Lleida">Lleida</option>
                    <option value="Tarragona">Tarragona</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Año Const. (aprox)</label>
                <input type="number" name="anio" placeholder="1985">
            </div>
            <div>
                <label>Metros (m²)</label>
                <input type="number" name="metros" placeholder="90">
            </div>
        </div>

        <div class="section-title">3. Información Energética</div>
        <label>¿Dispone de CEE oficial?</label>
        <select id="tiene_cee" name="tiene_cee" onchange="toggleLetra()">
            <option value="no">No lo tengo</option>
            <option value="si">Sí, está vigente</option>
            <option value="caducado">Está caducado</option>
        </select>

        <div id="campo_letra" style="display: none;">
            <label>Calificación (Letra actual o antigua)</label>
            <select name="letra">
                <option value="">- Seleccione Letra -</option>
                <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                <option value="G">G</option>
            </select>
        </div>

        <div class="grid">
            <div>
                <label>Calefacción Principal</label>
                <select name="calefaccion">
                    <option value="gas_natural">Gas Natural (Caldera)</option>
                    <option value="bomba_calor">Bomba de Calor / Splits</option>
                    <option value="radiadores_electricos">Radiadores Eléctricos</option>
                    <option value="gasoil_biomasa">Gasoil / Biomasa (Pellets)</option>
                    <option value="aerotermia">Aerotermia</option>
                    <option value="ninguna">Ninguna</option>
                </select>
            </div>
            <div>
                <label>Refrigeración (Aire Acond.)</label>
                <select name="refrigeracion">
                    <option value="no">No dispongo</option>
                    <option value="splits">Sí, Splits</option>
                    <option value="conductos">Sí, por Conductos</option>
                    <option value="aerotermia">Sí, Aerotermia</option>
                </select>
            </div>
        </div>

        <label>Gasto mensual luz/gas (€)</label>
        <input type="number" name="gasto_luz" placeholder="Media mensual">

        <div class="privacidad">
            <input type="checkbox" id="rgpd" required>
            <label for="rgpd">
                Acepto la <b>política de privacidad</b>. Los datos se tratarán para el diagnóstico técnico preliminar y envío del presupuesto.
            </label>
        </div>

        <button type="submit" id="btnEnviar">SOLICITAR ESTUDIO GRATUITO</button>
    </form>

    <div class="footer">
        <p>Servicio exclusivo para Cataluña. Un técnico colegiado analizará su caso.</p>
    </div>
</div>

<script>
    function toggleLetra() {
        const val = document.getElementById('tiene_cee').value;
        const mostrar = (val === 'si' || val === 'caducado');
        document.getElementById('campo_letra').style.display = mostrar ? 'block' : 'none';
    }

    const form = document.getElementById('leadForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = 'Enviando...';
        btn.disabled = true;

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // URL DE TU WEBHOOK N8N
        const WEBHOOK_URL = 'TU_URL_DE_N8N_AQUI';

        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (typeof fbq !== 'undefined') fbq('track', 'Lead');
            alert('✅ Solicitud recibida con éxito.');
            form.reset();
            toggleLetra(); // Oculta la letra tras resetear
        } catch (error) {
            alert('❌ Error al enviar. Inténtelo de nuevo.');
        } finally {
            btn.innerText = 'SOLICITAR ESTUDIO GRATUITO';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
