<div class="section-title">2. Datos del Inmueble</div>
        <label>Calle y Número</label>
        <input type="text" name="calle" placeholder="Carrer de la Marina, 123" required>
        
        <div class="grid">
            <div>
                <label>Código Postal</label>
                <input type="text" name="cp" placeholder="08001" required>
            </div>
            <div>
                <label>Provincia</label>
                <select name="provincia" required>
                    <option value="Barcelona">Barcelona</option>
                    <option value="Girona">Girona</option>
                    <option value="Lleida">Lleida</option>
                    <option value="Tarragona">Tarragona</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Tipo de Vivienda</label>
                <select name="tipo_vivienda" required>
                    <option value="piso_intermedio">Piso intermedio</option>
                    <option value="atico">Ático / Última planta</option>
                    <option value="bajo">Planta Baja</option>
                    <option value="unifamiliar">Casa / Chalet / Adosado</option>
                </select>
            </div>
            <div>
                <label>Uso de la vivienda</label>
                <select name="uso_vivienda">
                    <option value="habitual">Vivienda Habitual</option>
                    <option value="segunda_residencia">Segunda Residencia</option>
                    <option value="alquiler">Está alquilada</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Año Const. (aprox)</label>
                <input type="number" name="anio" placeholder="1985">
            </div>
            <div>
                <label>Metros (m²)</label>
                <input type="number" name="metros" placeholder="90">
            </div>
        </div>
        
        <label>¿Ha cambiado las ventanas o aislado hace poco?</label>
        <select name="reformas_previas">
            <option value="no">No, está de origen</option>
            <option value="si_ventanas">Sí, he cambiado ventanas</option>
            <option value="si_aislamiento">Sí, ventanas y paredes/techo</option>
        </select>
