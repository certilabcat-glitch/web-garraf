<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudi de Viabilitat Energètica | Certilab</title>
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('track', 'PageView');

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1271893388238243&ev=PageView&noscript=1"/></noscript>
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --noir: #1A1A1A; --gris: #6B6B6B; --gris-clair: #C8C8C8;
            --blanc: #FAFAF8; --creme: #F5F3EF; --terre: #8B7355;
            --accent: #2563eb; --vert: #7A8F7E;
        }
        body { font-family: 'Inter', sans-serif; background: var(--blanc); color: var(--noir); line-height: 1.7; font-weight: 300; -webkit-font-smoothing: antialiased; }
        .grain { position: fixed; inset: 0; opacity: 0.025; z-index: 999; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .lang-selector { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 1000; background: white; padding: 8px; border-radius: 100px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .lang-btn { padding: 6px 14px; border: 1px solid var(--gris-clair); background: transparent; border-radius: 100px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--gris); }
        .lang-btn.active { background: var(--noir); color: white; border-color: var(--noir); }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
        header { padding: 80px 0 50px; text-align: center; }
        .logo { font-family: 'Crimson Pro', serif; font-size: 1.1rem; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gris); margin-bottom: 6px; }
        .hero { text-align: center; padding: 40px 0 80px; max-width: 650px; margin: 0 auto; }
        h1 { font-family: 'Crimson Pro', serif; font-size: 2.6rem; font-weight: 400; line-height: 1.3; margin-bottom: 20px; color: var(--noir); }
        .calculator-phase { max-width: 600px; margin: 0 auto 100px; }
        .calc-card { background: var(--creme); padding: 40px; border: 1px solid rgba(139, 115, 85, 0.08); margin-bottom: 40px; }
        .field { margin-bottom: 24px; }
        label { display: block; margin-bottom: 10px; font-size: 0.92rem; color: var(--noir); font-weight: 400; }
        input, select { width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid var(--gris-clair); color: var(--noir); font-size: 0.95rem; }
        input:focus, select:focus { outline: none; border-bottom-color: var(--terre); }
        .results-display { background: white; padding: 32px; border: 1px solid rgba(139, 115, 85, 0.08); text-align: center; margin-top: 32px; display: none; }
        .big-number { font-family: 'Crimson Pro', serif; font-size: 3.5rem; font-weight: 300; color: var(--terre); line-height: 1; }
        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(139, 115, 85, 0.12); }
        .btn { padding: 16px 32px; border: none; font-size: 0.95rem; cursor: pointer; transition: 0.25s; font-family: 'Inter', sans-serif; font-weight: 500; width: 100%; margin-top: 24px; }
        .btn-primary { background: var(--noir); color: var(--blanc); }
        .btn-secondary { background: transparent; color: var(--gris); border: 1px solid var(--gris-clair); }
        .form-phase { display: none; max-width: 700px; margin: 0 auto 100px; }
        .form-phase.active { display: block; }
        .form-step { display: none; }
        .form-step.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .step-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; }
        .step-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--gris-clair); }
        .step-dot.active { background: var(--terre); transform: scale(1.3); }
        .info-box { background: #eff6ff; padding: 16px; border-radius: 4px; margin: 20px 0; border-left: 3px solid var(--accent); display: none; }
        .info-box.active { display: block; }
        .success-screen { display: none; text-align: center; padding: 80px 40px; max-width: 600px; margin: 0 auto; }
        .success-screen.active { display: block; }
        .lang-content { display: none; }
        .lang-content.active { display: inline; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLanguage('ca')" data-lang="ca">CAT</button>
        <button class="lang-btn" onclick="setLanguage('es')" data-lang="es">ESP</button>
    </div>
    
    <div class="container">
        <header>
            <div class="logo">Certilab</div>
            <div class="tagline">
                <span class="lang-content active" data-lang="ca">Consultoria Tècnica · Arquitectura</span>
                <span class="lang-content" data-lang="es">Consultoría Técnica · Arquitectura</span>
            </div>
        </header>

        <div class="calculator-phase" id="phase1">
            <div class="calc-card">
                <h2 style="text-align:center; margin-bottom:20px;">Calculadora d'Estalvi</h2>
                <form onsubmit="event.preventDefault(); calculateSavings();">
                    <div class="field">
                        <label>Superfície útil (m²)</label>
                        <input type="number" id="calc_superficie" placeholder="80" required min="30">
                    </div>
                    <div class="field">
                        <label>Any de construcció</label>
                        <input type="number" id="calc_anio" placeholder="1985" required>
                    </div>
                    <div class="field">
                        <label>Despesa mensual llum+gas (€)</label>
                        <input type="number" id="calc_gasto" placeholder="120" required>
                    </div>
                    <button type="submit" class="btn btn-primary">CALCULAR ESTALVI</button>
                </form>
            </div>

            <div class="results-display" id="results">
                <div class="big-number" id="savingsAmount">0€</div>
                <div style="font-size: 0.8rem; color: var(--gris); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px;">Estalvi anual estimat</div>
                <div class="metric-grid">
                    <div class="metric"><span class="metric-value" id="savingsPercent">0%</span><span class="metric-label">Reducció</span></div>
                    <div class="metric"><span class="metric-value" id="co2Reduction">0 kg</span><span class="metric-label">CO₂/any</span></div>
                    <div class="metric"><span class="metric-value" id="roiPeriod">—</span><span class="metric-label">ROI</span></div>
                </div>
                <button type="button" class="btn btn-primary" onclick="goToForm()">✓ VULL EL MEU INFORME GRATUÏT</button>
            </div>
        </div>

        <div class="form-phase" id="phase2">
            <div class="step-dots">
                <div class="step-dot active" data-step="1"></div>
                <div class="step-dot" data-step="2"></div>
                <div class="step-dot" data-step="3"></div>
                <div class="step-dot" data-step="4"></div>
            </div>

            <form id="detailedForm">
                <div class="form-step active" data-step="1">
                    <div class="field">
                        <label>La teva relació amb l'immoble</label>
                        <select name="perfil" id="perfilSelect" required>
                            <option value="">Selecciona...</option>
                            <option value="propietario">Propietari</option>
                            <option value="comprador">Comprador</option>
                            <option value="comunidad">President comunitat</option>
                            <option value="arquitecto">Arquitecte</option>
                        </select>
                    </div>
                    <div class="info-box" id="compradorInfo">
                        <label>Enllaç anunci (Idealista/Fotocasa)</label>
                        <input type="url" name="enlace_inmueble" placeholder="https://...">
                    </div>
                    <div class="field">
                        <label>Codi Postal (Catalunya)</label>
                        <input type="text" name="cp" id="cpInput" placeholder="08015" required>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="nextFormStep(2)">SEGÜENT →</button>
                </div>

                <div class="form-step" data-step="2">
                    <div class="grid">
                        <div class="field"><label>Superfície (m²)</label><input type="number" name="superficie" required></div>
                        <div class="field"><label>Any construcció</label><input type="number" name="anio" required></div>
                    </div>
                    <div class="field"><label>Despesa mensual (€)</label><input type="number" name="gasto_luz" required></div>
                    <div class="field">
                        <label>Tipus habitatge</label>
                        <select name="tipo_vivienda" required>
                            <option value="piso_intermedio">Pis intermedi</option>
                            <option value="atico">Àtic</option>
                            <option value="unifamiliar">Casa unifamiliar</option>
                        </select>
                    </div>
                    <div class="grid">
                        <button type="button" class="btn btn-secondary" onclick="previousFormStep(1)">← ENRERE</button>
                        <button type="button" class="btn btn-primary" onclick="nextFormStep(3)">SEGÜENT →</button>
                    </div>
                </div>

                <div class="form-step" data-step="3">
                    <div class="grid">
                        <div class="field">
                            <label>Calefacció</label>
                            <select name="calefaccion" required>
                                <option value="gas_natural">Gas Natural</option>
                                <option value="bomba_calor">Bomba Calor</option>
                                <option value="ninguna">Cap</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Finestres</label>
                            <select name="tipo_ventanas" required>
                                <option value="antiguas">Antigues</option>
                                <option value="modernas">Modernes</option>
                            </select>
                        </div>
                    </div>
                    <div class="field">
                        <label>Pressupost millores</label>
                        <select name="presupuesto" required>
                            <option value="menos3000">< 3.000€</option>
                            <option value="3000-10000">3k - 10k€</option>
                            <option value="mas10000">> 10k€</option>
                        </select>
                    </div>
                    <div class="grid">
                        <button type="button" class="btn btn-secondary" onclick="previousFormStep(2)">← ENRERE</button>
                        <button type="button" class="btn btn-primary" onclick="nextFormStep(4)">SEGÜENT →</button>
                    </div>
                </div>

                <div class="form-step" data-step="4">
                    <div class="field"><label>Nom i cognoms</label><input type="text" name="nombre" required></div>
                    <div class="field"><label>WhatsApp</label><input type="tel" name="whatsapp" required></div>
                    <div class="field"><label>Email</label><input type="email" name="email" required></div>
                    <div class="grid">
                        <button type="button" class="btn btn-secondary" onclick="previousFormStep(3)">← ENRERE</button>
                        <button type="submit" class="btn btn-primary" id="btnEnviar">ENVIAR SOL·LICITUD</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="success-screen" id="successScreen">
            <div style="font-size:4rem; color:var(--vert);">✓</div>
            <h2>Sol·licitud rebuda!</h2>
            <p>Eva María contactarà amb vostè en 24h a <strong id="emailConfirm"></strong></p>
        </div>
    </div>

    <script>
        let currentLang = 'ca';
        let calcData = {};

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
            document.querySelectorAll('.lang-content').forEach(el => el.classList.toggle('active', el.dataset.lang === lang));
        }

        document.getElementById('perfilSelect').addEventListener('change', function() {
            document.getElementById('compradorInfo').classList.toggle('active', this.value === 'comprador');
        });

        function calculateSavings() {
            const sup = parseFloat(document.getElementById('calc_superficie').value);
            const anio = parseFloat(document.getElementById('calc_anio').value);
            const gasto = parseFloat(document.getElementById('calc_gasto').value);

            calcData = { sup, anio, gasto };

            const ahorroAnual = Math.round(gasto * 12 * 0.45);
            document.getElementById('savingsAmount').textContent = ahorroAnual + '€';
            document.getElementById('savingsPercent').textContent = '45%';
            document.getElementById('co2Reduction').textContent = Math.round(sup * 12) + ' kg';
            document.getElementById('roiPeriod').textContent = '6.5 anys';

            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function goToForm() {
            document.getElementById('phase1').style.display = 'none';
            document.getElementById('phase2').classList.add('active');
            
            // VOLCADO DE DATOS (Solución al 0)
            document.querySelector('input[name="superficie"]').value = calcData.sup;
            document.querySelector('input[name="anio"]').value = calcData.anio;
            document.querySelector('input[name="gasto_luz"]').value = calcData.gasto;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextFormStep(step) {
            const current = document.querySelector('.form-step.active');
            if (step > parseInt(current.dataset.step)) {
                const inputs = current.querySelectorAll('input[required], select[required]');
                for (let input of inputs) if (!input.checkValidity()) return input.reportValidity();
            }
            current.classList.remove('active');
            document.querySelector(`.form-step[data-step="${step}"]`).classList.add('active');
            document.querySelectorAll('.step-dot').forEach((dot, i) => dot.classList.toggle('active', i + 1 === step));
        }

        function previousFormStep(step) { nextFormStep(step); }

        document.getElementById('detailedForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.innerText = 'ENVIANT...'; btn.disabled = true;

            const data = Object.fromEntries(new FormData(this));
            data.idioma = currentLang;

            try {
                await fetch('https://n8n-n8n.nfnizn.easypanel.host/webhook/registro-certilab', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                document.getElementById('phase2').style.display = 'none';
                document.getElementById('successScreen').classList.add('active');
                document.getElementById('emailConfirm').innerText = data.email;
            } catch (err) {
                alert('Error enviant dades'); btn.disabled = false;
            }
        });
    </script>
</body>
</html>
